<!--
  EmailJS: internal notification template.

  To Email: sam@sambalerbij.nl  (fixed in EmailJS template “To Email” field)
  Reply To: {{reply_to}}
  Subject: [Contact] {{subject}}

  Variables: subject, from_name, reply_to, message
-->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw contactformulier</title>
</head>
<body style="margin:0;padding:0;background-color:#f4f6f8;-webkit-font-smoothing:antialiased;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f4f6f8;">
    <tr>
      <td align="center" style="padding:32px 16px;">
        <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e2e8f0;">
          <tr>
            <td style="padding:24px 28px;background-color:#0f172a;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
              <p style="margin:0;font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:#94a3b8;">Nieuw bericht via website</p>
              <p style="margin:8px 0 0;font-size:18px;font-weight:700;color:#f8fafc;">{{subject}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:28px;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
              <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0">
                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #e2e8f0;">
                    <p style="margin:0 0 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#64748b;">Naam</p>
                    <p style="margin:0;font-size:16px;color:#0f172a;">{{from_name}}</p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:12px 0;border-bottom:1px solid #e2e8f0;">
                    <p style="margin:0 0 4px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#64748b;">E-mail</p>
                    <p style="margin:0;font-size:16px;"><a href="mailto:{{reply_to}}" style="color:#2563eb;text-decoration:none;">{{reply_to}}</a></p>
                  </td>
                </tr>
                <tr>
                  <td style="padding:16px 0 0;">
                    <p style="margin:0 0 8px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#64748b;">Bericht</p>
                    <div style="margin:0;padding:16px;background-color:#f8fafc;border-radius:8px;border:1px solid #e2e8f0;font-size:15px;line-height:1.6;color:#334155;white-space:pre-wrap;">{{message}}</div>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:16px 28px 24px;background-color:#f8fafc;border-top:1px solid #e2e8f0;font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;">
              <p style="margin:0;font-size:12px;color:#64748b;">Direct beantwoorden? Gebruik <strong>Reply</strong>, het adres van de afzender staat in het veld hierboven.</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
